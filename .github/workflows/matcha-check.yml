name: Matcha restock check

# The real 5-minute cadence comes from an external pinger (e.g. cron-job.org)
# calling the workflow_dispatch API. GitHub's own cron below is only a slow
# 24/7 backup: GitHub throttles scheduled runs heavily (often hours apart),
# so it must not be relied on for timing.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:              # adds a "Run workflow" button for manual runs
    inputs:
      mode:
        description: "check = look at stock now  |  test-email = send Jade a test email"
        type: choice
        options: [check, test-email]
        default: check

# Allow the job to commit the updated stock state back to the repo.
permissions:
  contents: write

# Never let two runs overlap (they'd fight over the state file).
concurrency:
  group: matcha-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check stock / send email
        env:
          MATCHA_SMTP_USER: ${{ secrets.MATCHA_SMTP_USER }}
          MATCHA_SMTP_PASS: ${{ secrets.MATCHA_SMTP_PASS }}
          MATCHA_MAIL_TO: ${{ secrets.MATCHA_MAIL_TO }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "test-email" ]; then
            python3 matcha_monitor.py --test-email
          else
            python3 matcha_monitor.py
          fi

      - name: Save updated stock state
        run: |
          if [ -z "$(git status --porcelain state.json)" ]; then
            echo "No stock-state change to save."
            exit 0
          fi
          git config user.name "matcha-bot"
          git config user.email "matcha-bot@users.noreply.github.com"
          git add state.json
          git commit -m "Update stock state [skip ci]"
          # Another run can push state.json between our checkout and our push,
          # which makes the rebase conflict on the same lines. Retry, resolving
          # conflicts in favor of our freshly-scraped state ("-X theirs": during
          # a rebase, "theirs" is the commit being replayed, i.e. ours).
          for attempt in 1 2 3; do
            if git pull --rebase --autostash -X theirs && git push; then
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            sleep $((attempt * 5))
          done
          echo "Could not push state after 3 attempts (harmless: next run rebuilds it)" >&2
          exit 1
